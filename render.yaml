services:
  - type: web
    name: motherland-tours
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: motherland-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: motherland-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: motherland-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: motherland-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: motherland-db
          property: password

databases:
  - name: motherland-db
    plan: free
